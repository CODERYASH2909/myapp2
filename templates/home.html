<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            width: 100%;
        }
        h2 {
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <form method="post">
        
        <input type="text" name="name" placeholder="Enter Name"><br>
        <input type="text" name="enroll" placeholder="Enrollment No"><br>
        <input type="email" name="email" placeholder="Email"><br>
        <input type="text" name="branch" placeholder="Branch"><br><br>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
